services:
  cath-lab-binder:
    build:
      context: .
      dockerfile: Dockerfile
    image: cath-lab-binder:latest
    container_name: cath-lab-binder
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
