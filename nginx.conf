server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|svg|pdf|heic|txt|json)$ {
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }
}
